<!DOCTYPE html>
<html>
<head>
<title>Functions with Events</title>
</head>
<body>

<h3>Enter a Number:</h3>
<input type="number" id="num">

<br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<h3 id="result"></h3>

<script>

function factorial() {
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for(let i = 1; i <= n; i++) {
        fact *= i;
    }

    document.getElementById("result").innerHTML = "Factorial: " + fact;
}


function fibonacci() {
    let n = parseInt(document.getElementById("num").value);
    let a = 0, b = 1, c, output = "";

    for(let i = 1; i <= n; i++) {
        output += a + " ";
        c = a + b;
        a = b;
        b = c;
    }

    document.getElementById("result").innerHTML = "Fibonacci: " + output;
}


function prime() {
    let n = parseInt(document.getElementById("num").value);
    let output = "";

    for(let i = 2; i <= n; i++) {
        let count = 0;

        for(let j = 1; j <= i; j++) {
            if(i % j == 0)
                count++;
        }

        if(count == 2)
            output += i + " ";
    }

    document.getElementById("result").innerHTML = "Prime Numbers: " + output;
}


function palindrome() {
    let n = document.getElementById("num").value;
    let rev = n.split("").reverse().join("");

    if(n === rev)
        document.getElementById("result").innerHTML = "Palindrome Number";
    else
        document.getElementById("result").innerHTML = "Not a Palindrome Number";
}

</script>

</body>
</html>
