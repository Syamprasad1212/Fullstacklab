<!DOCTYPE html>
<html>
<body>

<script>

let str = "javascript";

document.write("Original String: " + str + "<br>");

document.write("String Length: " + str.length + "<br>");

document.write("Uppercase String: " + str.toUpperCase() + "<br>");

document.write("Slice (0,4): " + str.slice(0,4) + "<br>");

document.write("Replace word: " + str.replace("java","super"));

</script>

</body>
</html>
