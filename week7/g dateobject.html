<!DOCTYPE html>
<html>
<body>

<script>

let today = new Date();

document.write("Current Date: " + today + "<br>");

document.write("Year: " + today.getFullYear() + "<br>");

document.write("Month: " + (today.getMonth() + 1) + "<br>");

document.write("Date: " + today.getDate() + "<br>");

document.write("Hours: " + today.getHours());

</script>

</body>
</html>
