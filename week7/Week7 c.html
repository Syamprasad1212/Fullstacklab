<!DOCTYPE html>
<html>
<body>

<script>

let fruits = ["Apple", "Banana", "Mango"];

document.write("Original Array: " + fruits + "<br>");

fruits.push("Orange");

document.write("After Push Operation: " + fruits + "<br>");

fruits.pop();

document.write("After Pop Operation: " + fruits + "<br>");

document.write("Array Length: " + fruits.length);

</script>

</body>
</html>
