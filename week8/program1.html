<!DOCTYPE html>
<html>
<head>
<title>Largest Number</title>
</head>
<body>

<script>

let a = parseInt(prompt("Enter first number"));
let b = parseInt(prompt("Enter second number"));
let c = parseInt(prompt("Enter third number"));

if(a == b && b == c)
{
    alert("EQUAL NUMBERS");
}
else if(a >= b && a >= c)
{
    alert(a + " LARGER NUMBER");
}
else if(b >= a && b >= c)
{
    alert(b + " LARGER NUMBER");
}
else
{
    alert(c + " LARGER NUMBER");
}

</script>

</body>
</html>
