<!DOCTYPE html>
<html>
<head>
<title>Loops Example</title>
</head>
<body>

<script>

// Using for loop
document.write("Using for loop:<br>");
for(let i = 1; i <= 10; i++)
{
    document.write(i + "<br>");
}

// Using while loop
document.write("<br>Using while loop:<br>");
let j = 1;
while(j <= 10)
{
    document.write(j + "<br>");
    j++;
}

// Using do-while loop
document.write("<br>Using do-while loop:<br>");
let k = 1;
do
{
    document.write(k + "<br>");
    k++;
}
while(k <= 10);

</script>

</body>
</html>
